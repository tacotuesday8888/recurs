name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.0"
          cache: npm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes apparmor-profiles apparmor-utils bubblewrap ripgrep
          # Ubuntu 24.04's current AppArmor 5.0 ABI mediation can deny the
          # CAP_NET_ADMIN operation Bubblewrap needs to initialize an isolated
          # loopback device. Reload the distribution profile with Ubuntu's
          # documented ABI 4.0 workaround on affected hosted runners. This
          # preserves --unshare-net instead of weakening Recurs network policy.
          if [[ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || true)" == "1" ]]; then
            sudo install -m 0644 \
              /usr/share/apparmor/extra-profiles/bwrap-userns-restrict \
              /etc/apparmor.d/bwrap-userns-restrict
            sudo sed -i 's/abi <abi\/5\.0>,/abi <abi\/4.0>,/' /etc/apparmor.d/bwrap-userns-restrict
            sudo apparmor_parser -r /etc/apparmor.d/bwrap-userns-restrict
          fi
      - run: npm ci
      - run: npm run check
      - run: npm run package:smoke-install

  verify-macos:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install system dependencies
        run: brew install ripgrep
      - run: npm ci
      - run: npm run check
      - run: npm run package:smoke-install

  verify-bun-installer:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.22.0"
          cache: npm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: npm ci --ignore-scripts
      - run: npm run package:build
      - run: npm run package:smoke-install-bun
