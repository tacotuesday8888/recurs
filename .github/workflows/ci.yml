name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --yes ripgrep
      - run: npm ci
      - run: npm run check
